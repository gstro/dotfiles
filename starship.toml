# Starship prompt config.
# Referenced via $STARSHIP_CONFIG in zsh/.zshrc.
# See docs/plans/terminal-modernization.md for context.

format = """$directory$git_branch$git_status$cmd_duration$character"""

[directory]
truncation_length = 3
truncate_to_repo = true

[git_branch]
symbol = " "

[git_status]
style = "yellow"

[cmd_duration]
min_time = 2000
format = "took [$duration]($style) "

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"
